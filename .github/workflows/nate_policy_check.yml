name: 'Nate Policy Lint & Safety Check'

on:
  push:
    branches: [ main, 'nate/*' ]
  pull_request:
    branches: [ main ]

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install pygments
      - name: Run policy validator
        run: python scripts/policy_checker.py policy/nate_policy.json
